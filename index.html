<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Base Quiz</title>
    <style>
        body { font-family: 'Arial Black', Impact, sans-serif; text-align: center; background: #f4ebd0; color: #111; padding: 10px; margin: 0; }
        .logo-container { margin: 15px auto; max-width: 180px; text-align: center; }
        .logo-img { width: 100%; height: auto; display: block; margin: 0 auto; }
        .box { background: #fff; border: 4px solid #000; border-radius: 12px; padding: 15px; box-shadow: 6px 6px 0px #000; margin: 15px auto; max-width: 400px; }
        input[type="text"] { width: 85%; padding: 12px; font-size: 16px; font-weight: bold; border: 3px solid #000; border-radius: 8px; box-shadow: inset 2px 2px 0px #ccc; outline: none; text-align: center; }
        button { background: #ffcc00; font-family: inherit; font-size: 18px; padding: 12px 20px; border: 3px solid #000; border-radius: 8px; box-shadow: 4px 4px 0px #000; cursor: pointer; text-transform: uppercase; margin-top: 15px; width: 90%; }
        button:active { transform: translate(3px, 3px); box-shadow: 1px 1px 0px #000; }
        button:disabled { background: #ccc; cursor: not-allowed; box-shadow: 4px 4px 0px #666; transform: none; }
        .timer { font-size: 60px; color: #e21b3c; text-shadow: 3px 3px 0px #000; margin: 10px 0; }
        .classifica-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 2px dashed #000; font-size: 18px; }
        .avatar-container { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-bottom: 15px; background: #eee; padding: 10px; border: 3px solid #000; border-radius: 8px; }
        .avatar-label { font-size: 28px; cursor: pointer; border: 2px solid transparent; padding: 4px; border-radius: 8px; display: inline-block; }
        input[type="radio"]:checked + .avatar-label { border: 3px solid #000; background: #ffcc00; box-shadow: 2px 2px 0px #000; }
        input[type="radio"] { display: none; }
    </style>
</head>
<body>
    <div class="logo-container">
        <img src="logo_BASE.png" class="logo-img" alt="Base Logo">
    </div>
    
    <div id="schermata-login" class="box">
        <h2>ENTRA NEL QUIZ!</h2>
        <input type="text" id="nickname" placeholder="Nome Squadra o Giocatore"><br><br>
        <h3>Scegli il tuo Avatar:</h3>
        <div class="avatar-container">
            <label><input type="radio" name="avatar" value="🕵️‍♂️" checked><span class="avatar-label">🕵️‍♂️</span></label>
            <label><input type="radio" name="avatar" value="🦸‍♀️"><span class="avatar-label">🦸‍♀️</span></label>
            <label><input type="radio" name="avatar" value="🦊"><span class="avatar-label">🦊</span></label>
            <label><input type="radio" name="avatar" value="👽"><span class="avatar-label">👽</span></label>
            <label><input type="radio" name="avatar" value="👻"><span class="avatar-label">👻</span></label>
            <label><input type="radio" name="avatar" value="🤠"><span class="avatar-label">🤠</span></label>
            <label><input type="radio" name="avatar" value="🤖"><span class="avatar-label">🤖</span></label>
            <label><input type="radio" name="avatar" value="🐯"><span class="avatar-label">🐯</span></label>
            <label><input type="radio" name="avatar" value="🧙‍♂️"><span class="avatar-label">🧙‍♂️</span></label>
            <label><input type="radio" name="avatar" value="🦄"><span class="avatar-label">🦄</span></label>
            <label><input type="radio" name="avatar" value="🍕"><span class="avatar-label">🍕</span></label>
            <label><input type="radio" name="avatar" value="😎"><span class="avatar-label">😎</span></label>
        </div>
        <button onclick="entra()">GIOCA ORA!</button>
    </div>

    <div id="schermata-gioco" class="box" style="display:none;">
        <div id="status-turno" style="font-size:18px; margin-bottom:10px;">In attesa...</div>
        <div id="timer" class="timer">--</div>
        
        <div id="area-risposta" style="display:none;">
            <input type="text" id="risposta-input" placeholder="Scrivi qui la tua risposta..."><br>
            <button id="btn-invia" onclick="inviaRisposta()">INVIA RISPOSTA</button>
        </div>
    </div>

    <div id="schermata-classifica" class="box" style="display:none;">
        <h3 style="background:#111; color:#fff; padding:5px; border-radius:5px;">🏆 CLASSIFICA LIVE 🏆</h3>
        <div id="lista-classifica"></div>
    </div>

    <script>
        let ws;
        let mioNome = "";
        const HOST = location.origin.replace(/^http/, 'ws');

        function entra() {
            mioNome = document.getElementById('nickname').value.trim();
            const avatar = document.querySelector('input[name="avatar"]:checked').value;
            if(!mioNome) return alert("Devi inserire un nome!");
            
            ws = new WebSocket(HOST);
            ws.onopen = () => { ws.send(JSON.stringify({ type: 'JOIN', nome: mioNome, avatar: avatar })); };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'SESSION_RESET') {
                    document.getElementById('schermata-login').style.display = 'block';
                    document.getElementById('schermata-gioco').style.display = 'none';
                    document.getElementById('schermata-classifica').style.display = 'none';
                    return;
                }
                if (data.type === 'STATUS_UPDATE') {
                    if (mioNome in data.giocatori) {
                        document.getElementById('schermata-login').style.display = 'none';
                        document.getElementById('schermata-gioco').style.display = 'block';
                        document.getElementById('schermata-classifica').style.display = 'block';
                        aggiornaClassifica(data.giocatori);
                    } else {
                        document.getElementById('schermata-login').style.display = 'block';
                        document.getElementById('schermata-gioco').style.display = 'none';
                        document.getElementById('schermata-classifica').style.display = 'none';
                        return;
                    }
                    if(!data.sessioneAttiva) {
                        document.getElementById('status-turno').innerText = "💤 Sessione momentaneamente ferma o conclusa.";
                        document.getElementById('area-risposta').style.display = 'none';
                        document.getElementById('timer').innerText = "--";
                    } else if (data.domandaInCorso) {
                        document.getElementById('timer').innerText = data.timerCorrente;
                        document.getElementById('status-turno').innerText = "🔴 ASCOLTA LA DOMANDA E RISPONDI!";
                        document.getElementById('area-risposta').style.display = 'block';
                        
                        const io = data.giocatori[mioNome];
                        if(io && io.haRisposto) {
                            document.getElementById('risposta-input').disabled = true;
                            document.getElementById('btn-invia').disabled = true;
                            document.getElementById('btn-invia').innerText = "RISPOSTA INVIATA!";
                        } else {
                            document.getElementById('risposta-input').disabled = false;
                            document.getElementById('btn-invia').disabled = false;
                            document.getElementById('btn-invia').innerText = "INVIA RISPOSTA";
                        }
                    } else {
                        document.getElementById('status-turno').innerText = "⌛ In attesa della prossima domanda...";
                        document.getElementById('area-risposta').style.display = 'none';
                        document.getElementById('timer').innerText = "00";
                    }
                }
                if (data.type === 'TIMER_TICK') document.getElementById('timer').innerText = data.timerCorrente;
                if (data.type === 'TIMER_END') {
                    document.getElementById('status-turno').innerText = "🛑 TEMPO SCADUTO!";
                    document.getElementById('area-risposta').style.display = 'none';
                }
            };
        }

        function inviaRisposta() {
            const ris = document.getElementById('risposta-input').value.trim();
            if(!ris) return;
            ws.send(JSON.stringify({ type: 'SUBMIT_ANSWER', nome: mioNome, risposta: ris }));
            document.getElementById('risposta-input').value = ""; 
        }

        function aggiornaClassifica(giocatori) {
            const lista = document.getElementById('lista-classifica');
            lista.innerHTML = "";
            let ordinati = Object.keys(giocatori).map(key => ({nome: key, ...giocatori[key]})).sort((a,b) => b.punti - a.punti);
            ordinati.forEach((g, i) => {
                lista.innerHTML += `<div class="classifica-item">
                    <span><strong>${i+1}.</strong> ${g.avatar} ${g.nome}</span>
                    <span style="background:#ffcc00; padding:2px 8px; border:2px solid #000; border-radius:5px;">${g.punti} pt</span>
                </div>`;
            });
        }
    </script>
</body>
</html>
